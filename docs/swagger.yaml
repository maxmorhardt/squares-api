definitions:
  model.APIError:
    properties:
      code:
        example: 400
        type: integer
      message:
        example: invalid request
        type: string
      requestId:
        example: 7db692fa-c767-468f-af3d-9231b0f88c69
        type: string
      timestamp:
        example: "2025-10-05T13:45:00Z"
        type: string
    type: object
  model.ContactRequest:
    properties:
      email:
        maxLength: 255
        type: string
      message:
        maxLength: 2000
        minLength: 1
        type: string
      name:
        maxLength: 100
        minLength: 1
        type: string
      subject:
        maxLength: 200
        minLength: 1
        type: string
      turnstileToken:
        maxLength: 2000
        minLength: 1
        type: string
    required:
    - email
    - message
    - name
    - subject
    - turnstileToken
    type: object
  model.ContactResponse:
    properties:
      message:
        type: string
    type: object
  model.ContestInvite:
    properties:
      contestId:
        type: string
      createdAt:
        type: string
      createdBy:
        type: string
      expiresAt:
        type: string
      id:
        type: string
      maxSquares:
        type: integer
      maxUses:
        type: integer
      role:
        $ref: '#/definitions/model.ParticipantRole'
      token:
        type: string
      updatedAt:
        type: string
      uses:
        type: integer
    type: object
  model.ContestParticipant:
    properties:
      contestId:
        type: string
      createdAt:
        type: string
      id:
        type: string
      inviteId:
        type: string
      joinedAt:
        type: string
      maxSquares:
        type: integer
      role:
        $ref: '#/definitions/model.ParticipantRole'
      updatedAt:
        type: string
      userId:
        type: string
    type: object
  model.ContestSwagger:
    properties:
      awayTeam:
        type: string
      createdAt:
        type: string
      createdBy:
        type: string
      homeTeam:
        type: string
      id:
        type: string
      name:
        type: string
      owner:
        type: string
      quarterResults:
        items:
          $ref: '#/definitions/model.QuarterResult'
        type: array
      squares:
        items:
          $ref: '#/definitions/model.Square'
        type: array
      status:
        type: string
      updatedAt:
        type: string
      updatedBy:
        type: string
      xLabels:
        items:
          type: integer
        type: array
      yLabels:
        items:
          type: integer
        type: array
    type: object
  model.CreateContestRequest:
    properties:
      awayTeam:
        maxLength: 20
        type: string
      homeTeam:
        maxLength: 20
        type: string
      name:
        maxLength: 20
        minLength: 1
        type: string
      owner:
        maxLength: 255
        type: string
      visibility:
        enum:
        - private
        - public
        type: string
    required:
    - name
    - owner
    type: object
  model.CreateInviteRequest:
    properties:
      expiresIn:
        description: minutes, 0 = no expiry
        minimum: 0
        type: integer
      maxSquares:
        maximum: 100
        minimum: 1
        type: integer
      maxUses:
        minimum: 0
        type: integer
      role:
        enum:
        - participant
        - viewer
        type: string
    required:
    - maxSquares
    - role
    type: object
  model.InvitePreviewResponse:
    properties:
      contestName:
        type: string
      maxSquares:
        type: integer
      owner:
        type: string
      role:
        type: string
    type: object
  model.InviteResponse:
    properties:
      inviteUrl:
        type: string
      token:
        type: string
    type: object
  model.PaginatedContestResponseSwagger:
    properties:
      contests:
        items:
          $ref: '#/definitions/model.ContestSwagger'
        type: array
      hasNext:
        type: boolean
      hasPrevious:
        type: boolean
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      totalPages:
        type: integer
    type: object
  model.ParticipantRole:
    enum:
    - owner
    - participant
    - viewer
    type: string
    x-enum-varnames:
    - ParticipantRoleOwner
    - ParticipantRoleParticipant
    - ParticipantRoleViewer
  model.QuarterResult:
    properties:
      awayTeamScore:
        type: integer
      contestId:
        type: string
      createdAt:
        type: string
      createdBy:
        type: string
      homeTeamScore:
        type: integer
      id:
        type: string
      quarter:
        type: integer
      updatedAt:
        type: string
      updatedBy:
        type: string
      winner:
        type: string
      winnerCol:
        type: integer
      winnerName:
        type: string
      winnerRow:
        type: integer
    type: object
  model.QuarterResultRequest:
    properties:
      awayTeamScore:
        maximum: 9999
        minimum: 0
        type: integer
      homeTeamScore:
        maximum: 9999
        minimum: 0
        type: integer
    type: object
  model.Square:
    properties:
      col:
        type: integer
      contestId:
        type: string
      createdAt:
        type: string
      createdBy:
        type: string
      id:
        type: string
      owner:
        type: string
      ownerName:
        type: string
      row:
        type: integer
      updatedAt:
        type: string
      updatedBy:
        type: string
      value:
        type: string
    type: object
  model.StatsResponse:
    properties:
      contestsCreatedToday:
        example: 5
        type: integer
      squaresClaimedToday:
        example: 42
        type: integer
      totalActiveContests:
        example: 12
        type: integer
    type: object
  model.UpdateContestRequest:
    properties:
      awayTeam:
        maxLength: 20
        type: string
      homeTeam:
        maxLength: 20
        type: string
      visibility:
        enum:
        - private
        - public
        type: string
    type: object
  model.UpdateParticipantRequest:
    properties:
      maxSquares:
        maximum: 100
        minimum: 0
        type: integer
      role:
        enum:
        - participant
        - viewer
        type: string
    type: object
  model.UpdateSquareRequest:
    properties:
      owner:
        type: string
      value:
        maxLength: 3
        minLength: 1
        type: string
    required:
    - owner
    - value
    type: object
info:
  contact: {}
  description: API for squares.maxstash.io
  title: Squares API
  version: 1.0.0
paths:
  /contact:
    post:
      consumes:
      - application/json
      description: Submit a contact form message
      parameters:
      - description: Contact form data
        in: body
        name: contact
        required: true
        schema:
          $ref: '#/definitions/model.ContactRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.ContactResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.APIError'
      summary: Submit a contact form
      tags:
      - contact
  /contests:
    put:
      consumes:
      - application/json
      description: Creates a new 10x10 contest
      parameters:
      - description: Contest
        in: body
        name: contest
        required: true
        schema:
          $ref: '#/definitions/model.CreateContestRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.ContestSwagger'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.APIError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.APIError'
      security:
      - BearerAuth: []
      summary: Create a new Contest
      tags:
      - contests
  /contests/{id}:
    delete:
      consumes:
      - application/json
      description: Deletes a contest by id. Only the contest owner can delete
      parameters:
      - description: Contest ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: Contest deleted successfully
        "400":
          description: Invalid contest id
          schema:
            $ref: '#/definitions/model.APIError'
        "403":
          description: Forbidden - user is not the owner
          schema:
            $ref: '#/definitions/model.APIError'
        "404":
          description: Contest not found
          schema:
            $ref: '#/definitions/model.APIError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/model.APIError'
      security:
      - BearerAuth: []
      summary: Delete contest
      tags:
      - contests
    patch:
      consumes:
      - application/json
      description: Updates the values of a contest
      parameters:
      - description: Contest ID
        in: path
        name: id
        required: true
        type: string
      - description: Contest update data
        in: body
        name: contest
        required: true
        schema:
          $ref: '#/definitions/model.UpdateContestRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.ContestSwagger'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/model.APIError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.APIError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.APIError'
      security:
      - BearerAuth: []
      summary: Update contest
      tags:
      - contests
  /contests/{id}/invites:
    get:
      description: Owner gets all invite links for a contest
      parameters:
      - description: Contest ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.ContestInvite'
            type: array
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/model.APIError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.APIError'
      security:
      - BearerAuth: []
      summary: Get all invites for a contest
      tags:
      - invites
    post:
      consumes:
      - application/json
      description: Owner creates an invite link with specified role and square limit
      parameters:
      - description: Contest ID
        in: path
        name: id
        required: true
        type: string
      - description: Invite details
        in: body
        name: invite
        required: true
        schema:
          $ref: '#/definitions/model.CreateInviteRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.InviteResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/model.APIError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.APIError'
      security:
      - BearerAuth: []
      summary: Create an invite link for a contest
      tags:
      - invites
  /contests/{id}/invites/{inviteId}:
    delete:
      description: Owner deletes an invite link
      parameters:
      - description: Contest ID
        in: path
        name: id
        required: true
        type: string
      - description: Invite ID
        in: path
        name: inviteId
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/model.APIError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.APIError'
      security:
      - BearerAuth: []
      summary: Delete an invite link
      tags:
      - invites
  /contests/{id}/participants:
    get:
      description: Returns all participants and their roles. Any participant can view.
        Public contests allow any authenticated user
      parameters:
      - description: Contest ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.ContestParticipant'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/model.APIError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.APIError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.APIError'
      security:
      - BearerAuth: []
      summary: Get all participants for a contest
      tags:
      - participants
  /contests/{id}/participants/{userId}:
    delete:
      description: Owner removes a participant and clears their squares
      parameters:
      - description: Contest ID
        in: path
        name: id
        required: true
        type: string
      - description: Target user ID
        in: path
        name: userId
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/model.APIError'
      security:
      - BearerAuth: []
      summary: Remove a participant from a contest
      tags:
      - participants
    patch:
      consumes:
      - application/json
      description: Owner updates a participant's role or max squares
      parameters:
      - description: Contest ID
        in: path
        name: id
        required: true
        type: string
      - description: Target user ID
        in: path
        name: userId
        required: true
        type: string
      - description: Update details
        in: body
        name: participant
        required: true
        schema:
          $ref: '#/definitions/model.UpdateParticipantRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.ContestParticipant'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/model.APIError'
      security:
      - BearerAuth: []
      summary: Update a participant's role or square limit
      tags:
      - participants
  /contests/{id}/quarter-result:
    post:
      consumes:
      - application/json
      description: Records the score and winner for a specific quarter
      parameters:
      - description: Contest ID
        in: path
        name: id
        required: true
        type: string
      - description: Quarter result data
        in: body
        name: quarterResult
        required: true
        schema:
          $ref: '#/definitions/model.QuarterResultRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.QuarterResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.APIError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.APIError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.APIError'
      security:
      - BearerAuth: []
      summary: Record quarter result
      tags:
      - contests
  /contests/{id}/squares/{squareId}:
    patch:
      consumes:
      - application/json
      description: Updates the value of a specific square in a contest
      parameters:
      - description: Contest ID
        in: path
        name: id
        required: true
        type: string
      - description: Square ID
        in: path
        name: squareId
        required: true
        type: string
      - description: Square
        in: body
        name: square
        required: true
        schema:
          $ref: '#/definitions/model.UpdateSquareRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Square'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/model.APIError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.APIError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.APIError'
      security:
      - BearerAuth: []
      summary: Update a single square in a contest
      tags:
      - contests
  /contests/{id}/squares/{squareId}/clear:
    post:
      consumes:
      - application/json
      description: Clears a square's value and owner, making it available for anyone
        to claim
      parameters:
      - description: Contest ID
        in: path
        name: id
        required: true
        type: string
      - description: Square ID
        in: path
        name: squareId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Square'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/model.APIError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.APIError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.APIError'
      security:
      - BearerAuth: []
      summary: Clear square value and owner
      tags:
      - contests
  /contests/{id}/start:
    post:
      consumes:
      - application/json
      description: Starts the contest, transitioning from ACTIVE to Q1 and randomizing
        labels
      parameters:
      - description: Contest ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.ContestSwagger'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.APIError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.APIError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.APIError'
      security:
      - BearerAuth: []
      summary: Start contest
      tags:
      - contests
  /contests/me:
    get:
      description: Returns all contests where the authenticated user is a participant
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.ContestSwagger'
            type: array
      security:
      - BearerAuth: []
      summary: Get all contests the user participates in
      tags:
      - participants
  /contests/owner/{owner}:
    get:
      description: Returns all contests created by a specific owner with pagination
      parameters:
      - description: Owner
        in: path
        name: owner
        required: true
        type: string
      - description: Page number
        in: query
        minimum: 1
        name: page
        required: true
        type: integer
      - description: Items per page (max 25)
        in: query
        maximum: 25
        minimum: 1
        name: limit
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.PaginatedContestResponseSwagger'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.APIError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.APIError'
      security:
      - BearerAuth: []
      summary: Get all contests by owner
      tags:
      - contests
  /contests/owner/{owner}/name/{name}:
    get:
      description: Returns a single contest by its owner and name. Private contests
        require the user to be a participant
      parameters:
      - description: Owner
        in: path
        name: owner
        required: true
        type: string
      - description: Name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.ContestSwagger'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/model.APIError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.APIError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.APIError'
      security:
      - BearerAuth: []
      summary: Get a contest by Owner and Name
      tags:
      - contests
  /health/live:
    get:
      description: Returns UP if the service process is running
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Liveness check
      tags:
      - health
  /health/ready:
    get:
      description: Checks database, NATS, and OIDC provider connectivity
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Readiness check
      tags:
      - health
  /invites/{token}:
    get:
      description: Returns contest name and invite details without authentication
      parameters:
      - description: Invite token
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.InvitePreviewResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.APIError'
        "410":
          description: Gone
          schema:
            $ref: '#/definitions/model.APIError'
      summary: Preview an invite link
      tags:
      - invites
  /invites/{token}/redeem:
    post:
      description: Authenticated user joins a contest via invite token
      parameters:
      - description: Invite token
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.ContestParticipant'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.APIError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.APIError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/model.APIError'
        "410":
          description: Gone
          schema:
            $ref: '#/definitions/model.APIError'
      security:
      - BearerAuth: []
      summary: Redeem an invite link
      tags:
      - invites
  /stats:
    get:
      description: Returns public stats including contests created today, squares
        claimed today, and total active contests
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.StatsResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.APIError'
      summary: Get platform stats
      tags:
      - stats
  /ws/contests/owner/{owner}/name/{name}:
    get:
      description: Establishes a persistent WebSocket connection to receive real-time
        updates for a specific contest
      parameters:
      - description: Contest Owner
        in: path
        name: owner
        required: true
        type: string
      - description: Contest Name
        in: path
        name: name
        required: true
        type: string
      responses:
        "101":
          description: WebSocket connection upgraded
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.APIError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.APIError'
        "500":
          description: Internal Server Error
