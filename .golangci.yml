version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - bodyclose
    - gosec
    - errname
    - errorlint
    - exhaustive
    - gocritic
    - misspell
    - nilerr
    - prealloc
    - unconvert
    - unparam
    - whitespace
  settings:
    govet:
      enable:
        - shadow
    gosec:
      excludes:
        - G104
    exhaustive:
      default-signifies-exhaustive: true
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
  exclusions:
    paths:
      - docs
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - bodyclose

formatters:
  enable:
    - gofmt
